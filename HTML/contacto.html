<!-- MAIN -->
<main>

    <section>
        <h2>Contáctanos</h2>
        <p>¿Tienes preguntas o quieres planear tu próximo viaje? Escríbenos...</p>

        <form>
            <label>Nombre:</label><br>
            <input type="text" placeholder="Tu nombre"><br><br>

            <label>Correo:</label><br>
            <input type="email" placeholder="tu@email.com"><br><br>

            <label>Destino de interés:</label><br>
            <select>
                <option>Galápagos</option>
                <option>París</option>
                <option>New York</option>
            </select><br><br>

            <label>Mensaje:</label><br>
            <textarea placeholder="Escribe tu mensaje"></textarea><br><br>

            <button type="submit">Enviar</button>
        </form>
    </section>

    <section>
        <h2>Información</h2>
        <p>Guayaquil, Ecuador</p>
        <p>+593 999 999 999</p>
        <p>contacto@zylo.com</p>
    </section>

</main>
